# Railway / NIXPACKS build config.
#
# WHY THIS EXISTS: the owner_report module renders its PDF through the FROZEN renderer,
# which prints via headless Chromium (Playwright). The default NIXPACKS build has no
# Chromium, so reports would fail to render in production. This file adds the Chromium
# browser + its runtime shared libraries during the build.
#
# The rest of the bot is UNAFFECTED — the existing fpdf2 PDF paths keep working. This
# only ADDS a browser install; it does not change how the app starts (Procfile is
# unchanged: `web: python bot.py`).
#
# ⚠️ NOT VERIFIED ON RAILWAY FROM THIS SESSION. Headless-Chromium-under-NIXPACKS is
# environment-sensitive; watch the first deploy's build log. If Chromium fails to launch,
# the documented fallback is to switch the builder to the official Playwright Python
# Docker image (mcr.microsoft.com/playwright/python) — see owner_report/README.md.

[phases.setup]
# Runtime shared libraries headless Chromium needs (Playwright ships its own Chromium
# binary but not these system libs).
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
  "libdrm2", "libxkbcommon0", "libxcomposite1", "libxdamage1", "libxfixes3",
  "libxrandr2", "libgbm1", "libpango-1.0-0", "libcairo2", "libasound2",
  "libatspi2.0-0", "fonts-liberation", "libu2f-udev",
]

[phases.build]
# Download the Chromium browser binary Playwright drives. Runs after pip install.
cmds = ["python -m playwright install chromium"]

[variables]
# Bake the browser into the image at a stable path.
PLAYWRIGHT_BROWSERS_PATH = "/app/.cache/ms-playwright"
