<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>أوجا برين · Ouja Brain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#161310; --ink2:#1b1813; --panel:#221d17; --panel2:#2a241d;
  --line:rgba(200,169,110,.16); --line-strong:rgba(200,169,110,.30);
  --cream:#F7F1E6; --cream-dim:#d7cfbe; --muted:#9b9382;
  --gold:#C8A96E; --gold-soft:#e8d2a3; --gold-deep:#a8884f;
  --ok:#86b96f; --warn:#e0a458; --bad:#d9776c; --info:#86a9c4;
  --r:16px; --r-sm:11px; --ease:cubic-bezier(.23,1,.32,1);
  --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 18px 40px -24px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(1200px 600px at 85% -10%, #221c14 0%, var(--ink) 55%) fixed;
  color:var(--cream); font-family:"Tajawal","Inter",system-ui,"Segoe UI",Tahoma,sans-serif;
  -webkit-font-smoothing:antialiased; font-size:15px; line-height:1.5; min-height:100vh;
}
:lang(en),[dir="ltr"]{font-family:"Inter","Tajawal",system-ui,sans-serif}
a{color:inherit}
.wrap{max-width:1180px;margin:0 auto;padding:22px 20px 80px}
.mono{font-family:"Inter",ui-monospace,monospace;font-variant-numeric:tabular-nums}

/* header */
.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:11px;margin-inline-end:auto}
.brand .dot{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  background:linear-gradient(150deg,var(--gold-soft),var(--gold-deep));color:#231b0e;font-weight:800;box-shadow:var(--shadow)}
.brand h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.2px}
.brand .sub{font-size:12px;color:var(--muted);margin-top:1px}
.btn{appearance:none;border:1px solid var(--line-strong);background:var(--panel);color:var(--cream);
  padding:9px 14px;border-radius:var(--r-sm);font:inherit;font-weight:700;cursor:pointer;
  transition:transform .16s var(--ease),background .16s var(--ease),border-color .16s var(--ease)}
.btn:hover{background:var(--panel2);border-color:var(--gold-deep)}
.btn:active{transform:scale(.97)}
.btn.gold{background:linear-gradient(150deg,var(--gold-soft),var(--gold));color:#231b0e;border-color:transparent}
.btn.gold:hover{filter:brightness(1.05)}
.btn.ghost{background:transparent}
.btn.sm{padding:6px 10px;font-size:13px}
.btn.danger{border-color:rgba(217,119,108,.5);color:#f0b3ab}
.btn[disabled]{opacity:.45;cursor:not-allowed;transform:none}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
.seg button{appearance:none;border:0;background:transparent;color:var(--muted);padding:6px 13px;font:inherit;font-weight:700;cursor:pointer;transition:color .16s var(--ease)}
.seg button.on{background:var(--gold);color:#231b0e}

/* tabs */
.tabs{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 20px}
.tab{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--cream-dim);
  padding:9px 15px;border-radius:999px;font:inherit;font-weight:700;font-size:14px;cursor:pointer;
  transition:transform .16s var(--ease),background .16s var(--ease),color .16s var(--ease),border-color .16s var(--ease)}
.tab:hover{background:var(--panel2)}
.tab:active{transform:scale(.97)}
.tab.on{background:linear-gradient(150deg,rgba(232,210,163,.22),rgba(168,136,79,.16));color:var(--cream);border-color:var(--gold-deep)}

/* cards */
.card{background:linear-gradient(180deg,var(--panel),var(--ink2));border:1px solid var(--line);
  border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.grid{display:grid;gap:14px}
.section{animation:rise .4s var(--ease) both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.hidden{display:none!important}
.eyebrow{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
.muted{color:var(--muted)} .dim{color:var(--cream-dim)}
.h2{font-size:16px;font-weight:800;margin:0 0 2px}
.big{font-size:clamp(26px,4.4vw,40px);font-weight:800;letter-spacing:-.5px;line-height:1.1}

/* KPI strip */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px}
.kpi .v{font-size:24px;font-weight:800;font-family:"Inter";font-variant-numeric:tabular-nums}
.kpi .k{font-size:12px;color:var(--muted);margin-top:2px}
@media(max-width:720px){.kpis{grid-template-columns:repeat(2,1fr)}}

/* today's move */
.move-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12.5px;font-weight:700;border:1px solid var(--line-strong)}
.pill.gold{background:rgba(200,169,110,.14);color:var(--gold-soft)}
.pill.ok{background:rgba(134,185,111,.14);color:#a8d493;border-color:rgba(134,185,111,.4)}
.pill.warn{background:rgba(224,164,88,.14);color:#f0c388;border-color:rgba(224,164,88,.4)}
.tiers{display:flex;gap:6px;flex-wrap:wrap}
.tier{font-size:11.5px;padding:3px 9px;border-radius:999px;border:1px solid var(--line)}
.tier.Turaif{background:rgba(200,169,110,.2);color:var(--gold-soft);border-color:var(--gold-deep)}
.tier.Gold{background:rgba(224,164,88,.14);color:#f0c388}
.tier.Silver{background:rgba(134,169,196,.12);color:#a9c6dc}
.proj{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.proj .b{background:var(--panel2);border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px;text-align:center}
.proj .b .v{font-size:22px;font-weight:800;font-family:"Inter"}
.proj .b .k{font-size:12px;color:var(--muted)}
.msg{background:#13110d;border:1px solid var(--line);border-radius:var(--r-sm);padding:14px 16px;margin-top:4px;
  white-space:pre-wrap;line-height:1.7;font-size:15px}
.msg .who{font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.imgp{font-size:12.5px;color:var(--muted);border-inline-start:2px solid var(--gold-deep);padding-inline-start:10px;margin-top:10px;line-height:1.5}
.rationale{font-size:15px;line-height:1.7;background:rgba(200,169,110,.07);border:1px solid var(--line);
  border-radius:var(--r-sm);padding:14px 16px;margin:4px 0 16px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
.meta-row{display:flex;gap:18px;flex-wrap:wrap;font-size:13px;color:var(--cream-dim);margin-top:14px}
.meta-row b{color:var(--cream);font-family:"Inter"}

/* audience chips + excluded */
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.chip{font-size:12.5px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:4px 10px;display:inline-flex;gap:6px;align-items:center}
.chip .mono{font-size:11px;color:var(--muted)}
.exc{margin-top:8px;display:grid;gap:7px}
.exc .row{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:8px 12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-sm)}
.exc .n{font-family:"Inter";font-weight:700;color:var(--warn)}

/* silent */
.silent{text-align:center;padding:30px 18px}
.silent .ic{font-size:40px}
.silent .big{margin:8px 0 6px;color:var(--gold-soft)}

/* heatmap */
.hm-scroll{overflow-x:auto;padding-bottom:6px}
.hm{border-collapse:separate;border-spacing:2px;min-width:max-content}
.hm th{font-weight:700;font-size:10.5px;color:var(--muted);padding:0 0 6px;font-family:"Inter"}
.hm th.we{color:var(--gold-soft)}
.hm td.name{font-size:12px;color:var(--cream-dim);white-space:nowrap;padding-inline-end:10px;text-align:start;max-width:170px;overflow:hidden;text-overflow:ellipsis}
.cell{width:16px;height:16px;border-radius:4px;background:#100e0a;border:1px solid rgba(255,255,255,.03);cursor:default;transition:transform .12s var(--ease)}
.cell:hover{transform:scale(1.35);z-index:2;position:relative}
.cell.booked{background:#3a4a35}
.cell.blocked{background:#2a2620}
.cell.empty{background:#332a1c}
.cell.soft{background:linear-gradient(150deg,var(--gold),var(--gold-deep));box-shadow:0 0 7px rgba(200,169,110,.6)}
.cell.orphan{outline:1px solid var(--bad)}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:12px}
.legend span{display:inline-flex;gap:6px;align-items:center}
.sw{width:13px;height:13px;border-radius:3px;display:inline-block}

/* health */
.health{display:grid;grid-template-columns:1.1fr 1fr;gap:14px}
@media(max-width:760px){.health{grid-template-columns:1fr}}
.bars{display:grid;gap:9px;margin-top:4px}
.bar{display:grid;grid-template-columns:90px 1fr 44px;align-items:center;gap:10px;font-size:13px}
.bar .track{height:9px;background:var(--panel2);border-radius:999px;overflow:hidden}
.bar .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold-deep),var(--gold))}
.bar .fill.ok{background:linear-gradient(90deg,#5e8a4c,var(--ok))}
.bar .fill.bad{background:linear-gradient(90deg,#b0564c,var(--bad))}
.bar .n{text-align:end;font-family:"Inter";font-weight:700}
.statgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 13px}
.stat .v{font-size:20px;font-weight:800;font-family:"Inter"}
.stat .k{font-size:12px;color:var(--muted)}

/* campaigns + settings */
.clist{display:grid;gap:9px}
.crow{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 14px;flex-wrap:wrap}
.crow .code{font-family:"Inter";font-weight:800;color:var(--gold);width:42px}
.crow .nm{font-weight:700;margin-inline-end:auto}
.set-group{margin-bottom:18px}
.set-group h3{font-size:13px;color:var(--gold);text-transform:uppercase;letter-spacing:.1em;margin:0 0 10px}
.set-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(max-width:680px){.set-grid{grid-template-columns:1fr}}
.field{display:grid;gap:5px}
.field label{font-size:13px}
.field .hlp{font-size:11.5px;color:var(--muted)}
.field input{background:#13110d;border:1px solid var(--line);color:var(--cream);border-radius:9px;padding:9px 11px;font:inherit;font-family:"Inter"}
.field input:focus{outline:none;border-color:var(--gold-deep)}
.toast{position:fixed;inset-block-end:20px;inset-inline-start:50%;transform:translateX(50%) translateY(20px);
  background:var(--panel2);border:1px solid var(--gold-deep);color:var(--cream);padding:11px 18px;border-radius:12px;
  opacity:0;transition:all .3s var(--ease);pointer-events:none;z-index:50;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(50%) translateY(0)}
.skel{color:var(--muted);padding:30px;text-align:center}
.note{font-size:12px;color:var(--muted);background:rgba(134,169,196,.08);border:1px solid rgba(134,169,196,.2);
  border-radius:var(--r-sm);padding:10px 13px;margin-top:12px;line-height:1.6}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <div class="dot">ع</div>
      <div><h1 id="ttl">أوجا برين</h1><div class="sub" id="subttl">طبقة القرار للتسويق عبر واتساب</div></div>
    </div>
    <div class="seg" id="langseg">
      <button data-l="ar" class="on">عربي</button>
      <button data-l="en">EN</button>
    </div>
    <button class="btn ghost sm" id="refreshBtn">↻ <span data-t="refresh">تحديث</span></button>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="tabs" id="tabs"></div>

  <div id="panel"><div class="card skel">…</div></div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
const TOKEN = new URLSearchParams(location.search).get("token") || "";
let LANG = localStorage.getItem("brain_lang") || "ar";
let STATE = { move:null, health:null, heatmap:null, campaigns:null, settings:null };
let TAB = "move";

const T = {
  refresh:["تحديث","Refresh"],
  tab_move:["حركة اليوم","Today's Move"], tab_heat:["الخريطة الحرارية","Heatmap"],
  tab_health:["صحة القائمة","List Health"], tab_camp:["الحملات","Campaigns"], tab_set:["الإعدادات","Settings"],
  k_open:["ليالٍ فاضية (الأفق)","Open nights (horizon)"], k_imm:["وشيكة ≤٧٢س","Imminent ≤72h"],
  k_occ:["الإشغال القريب","Near occupancy"], k_aud:["جمهور اليوم","Audience today"],
  silent_title:["أرسل لا شيء اليوم","Send nothing today"],
  approve:["اعتماد وتسليم لكرزوم","Approve & hand to Karzoum"], reject:["رفض","Reject"],
  recompute:["إعادة الحساب","Recompute"], dl:["تنزيل ملف الجمهور","Download audience CSV"],
  audience:["الجمهور","Audience"], excluded:["مستبعدون (الحارس)","Excluded (Governor)"],
  proj_replies:["ردود متوقعة","Replies"], proj_book:["حجوزات متوقعة","Bookings"], proj_rev:["إيراد متوقع","Revenue"],
  sched:["موعد الإرسال","Scheduled"], cap:["السقف اليومي","Daily cap"], remain:["المتبقي اليوم","Remaining today"],
  pool:["البركة المؤهلة","Eligible pool"], targets:["الفئات المستهدفة","Target tiers"],
  msg_preview:["معاينة الرسالة","Message preview"], img_prompt:["وصف الصورة","Image prompt"],
  members:["الأعضاء","Members"], available:["متاحون","Available"], cooldown:["فترة سماح","Cooldown"],
  rested:["في راحة","Rested"], opted:["ألغوا الاشتراك","Opted-out"], optrate:["معدل الإلغاء (٣٠ يوم)","Opt-out 30d"],
  upcoming:["لديهم حجز قادم","Upcoming booking"], inhouse:["مقيمون حالياً","In-house"],
  sent_today:["أُرسل اليوم","Sent today"], by_tier:["حسب الفئة","By tier"],
  save:["حفظ","Save"], saved:["تم الحفظ ✓","Saved ✓"],
  legend_book:["محجوز","Booked"], legend_empty:["فاضي","Empty"], legend_soft:["مخفّض/ضعيف","Softened"], legend_block:["محظور","Blocked"],
  loading:["جارٍ التحميل…","Loading…"], none_today:["لا توجد حركة محسوبة بعد","No move computed yet"],
  approved:["تم الاعتماد — نزّل الملف لكرزوم","Approved — download the file for Karzoum"],
  no_data:["لا توجد بيانات كافية بعد (المخزون يُحمَّل).","Not enough data yet (inventory warming up)."],
  why:["لماذا هذه الحركة؟","Why this move?"],
  msg_karzoum:["الرسالة — الصقها في كرزوم","Message — paste into Karzoum"],
  paste_hint:["انسخ النص والصقه في منشئ حملة كرزوم","Copy & paste into Karzoum's composer"],
  sample:["مثال بالاسم","Sample with a name"],
  image_for:["وصف الصورة — أرفقها في كرزوم","Image prompt — attach in Karzoum"],
  copy:["نسخ","Copy"], copied:["تم النسخ ✓","Copied ✓"],
  csv_note2:["ملف الجمهور = الاسم + الجوال + الفئة فقط. النص والصورة تلصقها داخل كرزوم.","Audience file = Name + Phone + Tag only. The message + image you paste into Karzoum."],
  import_members:["استيراد ملف الأعضاء","Import member file"],
  importing:["جارٍ الاستيراد…","Importing…"],
  step1:["١) نزّل ملف الجمهور","1) Download audience"], step2:["٢) الصق الرسالة + الصورة في كرزوم","2) Paste message + image in Karzoum"],
};
const tx = k => (T[k]||["",""])[LANG==="ar"?0:1];
const num = n => (n==null?"—":Number(n).toLocaleString(LANG==="ar"?"ar-EG":"en-US"));
const money = n => (n==null?"—":num(Math.round(n))+" "+(LANG==="ar"?"ر.س":"SAR"));

function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"),2600); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function copyEl(id){ const el=document.getElementById(id); if(!el) return; const t=el.innerText||el.textContent||"";
  if(navigator.clipboard){ navigator.clipboard.writeText(t).then(()=>toast(tx("copied"))).catch(()=>toast("⧉")); } else { toast("⧉"); } }

async function api(path, opts){
  const sep = path.includes("?")?"&":"?";
  const url = path + sep + "token=" + encodeURIComponent(TOKEN);
  const r = await fetch(url, opts||{});
  if(r.status===401){ document.getElementById("panel").innerHTML='<div class="card skel">🔒 '+ (LANG==="ar"?"التوكن غير صالح — افتح من رابط اللوحة.":"Invalid token — open from the dashboard link.") +'</div>'; throw new Error("401"); }
  return r.json();
}
async function post(path, body){
  return api(path, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body||{})});
}

function applyLang(){
  document.documentElement.lang = LANG; document.documentElement.dir = LANG==="ar"?"rtl":"ltr";
  document.getElementById("ttl").textContent = LANG==="ar"?"أوجا برين":"Ouja Brain";
  document.getElementById("subttl").textContent = LANG==="ar"?"طبقة القرار للتسويق عبر واتساب":"WhatsApp marketing decision layer";
  document.querySelectorAll("[data-t]").forEach(el=>el.textContent=tx(el.getAttribute("data-t")));
  document.querySelectorAll("#langseg button").forEach(b=>b.classList.toggle("on", b.getAttribute("data-l")===LANG));
  renderTabs(); renderKpis(); renderPanel();
}

function renderTabs(){
  const tabs=[["move","tab_move"],["heat","tab_heat"],["health","tab_health"],["camp","tab_camp"],["set","tab_set"]];
  document.getElementById("tabs").innerHTML = tabs.map(([id,k])=>
    `<button class="tab ${TAB===id?"on":""}" data-tab="${id}">${tx(k)}</button>`).join("");
  document.querySelectorAll("#tabs .tab").forEach(b=>b.onclick=()=>{TAB=b.getAttribute("data-tab");renderTabs();renderPanel();});
}

function renderKpis(){
  const s=(STATE.move&&STATE.move.signals)||{};
  const items=[
    [tx("k_open"), num(s.open_weekday_nights!=null?s.open_weekday_nights:s.open_nights_total)],
    [tx("k_imm"), num(s.imminent_open_nights)],
    [tx("k_occ"), (s.occupancy_pct!=null?s.occupancy_pct+"%":"—")],
    [tx("k_aud"), STATE.move? (STATE.move.silent?"0":num(STATE.move.audience_size)) : "—"],
  ];
  document.getElementById("kpis").innerHTML = items.map(([k,v])=>
    `<div class="kpi"><div class="v">${v}</div><div class="k">${k}</div></div>`).join("");
}

/* ---------- Today's Move ---------- */
function renderMove(){
  const m=STATE.move;
  if(!m) return `<div class="card skel">${tx("loading")}</div>`;
  if(m.silent){
    return `<div class="card section"><div class="silent">
      <div class="ic">🌙</div>
      <div class="big">${tx("silent_title")}</div>
      <p class="dim" style="max-width:560px;margin:6px auto 0">${LANG==="ar"?m.rationale:(m.rationale_en||m.rationale)||""}</p>
      <div class="actions" style="justify-content:center;margin-top:18px">
        <button class="btn ghost sm" id="recomputeBtn">↻ ${tx("recompute")}</button>
      </div></div></div>`;
  }
  const c=m.campaign||{};
  const tiers=(c.tier_targets||[]).map(t=>`<span class="tier ${t}">${t}</span>`).join(" ");
  const sampleName = (m.audience_preview&&m.audience_preview[0]&&m.audience_preview[0].first_name)|| (LANG==="ar"?"فيصل":"Guest");
  const msg=(c.message_template||"").split("{name}").join(sampleName);
  const exc=m.excluded||{};
  const excRows=Object.entries(exc.by_reason||{}).sort((a,b)=>b[1]-a[1]).map(([r,n])=>
    `<div class="row"><span>${r}</span><span class="n">${num(n)}</span></div>`).join("");
  const chips=(m.audience_preview||[]).slice(0,24).map(a=>
    `<span class="chip">${a.first_name||"—"} <span class="tier ${a.tier}" style="padding:1px 7px">${a.tier||""}</span> <span class="mono">${a.phone||""}</span></span>`).join("");
  const status=m.status;
  return `<div class="card section">
    <div class="move-head">
      <div style="margin-inline-end:auto">
        <div class="eyebrow">${c.code||""} · ${tx("targets")}</div>
        <div class="big" style="margin:3px 0 6px">${c.name||""}</div>
        <div class="tiers">${tiers}</div>
      </div>
      <div style="text-align:end">
        ${status==="approved"?`<span class="pill ok">✓ ${tx("approved")}</span>`:`<span class="pill gold">⚡ ${c.offer||""}</span>`}
      </div>
    </div>

    <div class="rationale">${LANG==="ar"?m.rationale:(m.rationale_en||m.rationale)||""}</div>

    <div class="proj">
      <div class="b"><div class="v">${num(m.projected.replies)}</div><div class="k">${tx("proj_replies")}</div></div>
      <div class="b"><div class="v">${num(m.projected.bookings)}</div><div class="k">${tx("proj_book")}</div></div>
      <div class="b"><div class="v">${money(m.projected.revenue)}</div><div class="k">${tx("proj_rev")}</div></div>
    </div>

    <div class="grid" style="grid-template-columns:1fr 1fr;gap:14px" id="mvcols">
      <div>
        <div class="h2">${tx("msg_karzoum")}</div>
        <div class="msg" style="white-space:pre-wrap"><div class="who">${tx("paste_hint")}</div><span id="pasteMsg">${esc(m.paste_message||msg||"—")}</span></div>
        <div style="margin-top:6px"><button class="btn ghost sm" onclick="copyEl('pasteMsg')">⧉ ${tx("copy")}</button></div>
        <div class="imgp" style="margin-top:12px;white-space:pre-wrap"><div class="who" style="margin-bottom:4px">${tx("sample")}: ${esc(sampleName)}</div>${esc(msg)}</div>
        ${c.image_prompt?`<div class="h2" style="margin-top:14px">${tx("image_for")}</div>
          <div class="imgp" style="white-space:pre-wrap;max-height:170px;overflow:auto"><span id="pasteImg">${esc(c.image_prompt)}</span></div>
          <div style="margin-top:6px"><button class="btn ghost sm" onclick="copyEl('pasteImg')">⧉ ${tx("copy")}</button></div>`:""}
      </div>
      <div>
        <div class="h2">${tx("audience")} · <span class="mono">${num(m.audience_size)}</span></div>
        <div class="chips">${chips||'<span class="muted">—</span>'}</div>
        <div class="h2" style="margin-top:16px">${tx("excluded")} · <span class="mono">${num(exc.total||0)}</span></div>
        <div class="exc">${excRows||'<span class="muted">—</span>'}</div>
      </div>
    </div>

    <div class="meta-row">
      <span>${tx("sched")}: <b>${(m.scheduled_time||"").replace("T"," ")}</b></span>
      <span>${tx("pool")}: <b>${num(m.audience_size)}</b></span>
      <span>${tx("cap")}: <b>${num(m.daily_cap)}</b></span>
      <span>${tx("remain")}: <b>${num(m.remaining_today)}</b></span>
    </div>

    <div class="actions">
      ${status==="approved"
        ? `<a class="btn gold" href="/api/brain/export/${m.id}?token=${encodeURIComponent(TOKEN)}">⬇ ${tx("dl")}</a>`
        : `<button class="btn gold" id="approveBtn">✓ ${tx("approve")}</button>
           <button class="btn danger sm" id="rejectBtn">✕ ${tx("reject")}</button>`}
      <button class="btn ghost sm" id="recomputeBtn">↻ ${tx("recompute")}</button>
    </div>
    ${status==="approved"
      ? `<div class="note" style="border-color:rgba(134,185,111,.3);background:rgba(134,185,111,.08)">✓ <b>${tx("step1")}</b> · ${tx("step2")}</div>`
      : `<div class="note">ℹ️ ${tx("csv_note2")}</div>`}
  </div>`;
}

/* ---------- Heatmap ---------- */
function renderHeat(){
  const h=STATE.heatmap;
  if(!h) return `<div class="card skel">${tx("loading")}</div>`;
  if(!h.units||!h.units.length) return `<div class="card skel">${tx("no_data")}</div>`;
  const days=h.days||[];
  const head=days.map(d=>{
    const dd=(d.date||"").slice(8,10);
    return `<th class="${d.weekend?"we":""}">${dd}</th>`;
  }).join("");
  const rows=h.units.map(u=>{
    const cells=u.cells.map((c,i)=>{
      let cls="cell";
      if(c.s==="booked")cls+=" booked"; else if(c.s==="blocked")cls+=" blocked";
      else if(c.s==="empty"){cls+= c.soft?" soft":" empty";}
      if(c.orphan)cls+=" orphan";
      const dt=(days[i]&&days[i].date)||"";
      const price=c.p?(" · "+c.p):"";
      return `<td><div class="${cls}" title="${u.name} · ${dt} · ${c.s||""}${price}"></div></td>`;
    }).join("");
    return `<tr><td class="name">${u.name}</td>${cells}</tr>`;
  }).join("");
  return `<div class="card section">
    <div class="h2">${LANG==="ar"?"٣٠ يوم · إشغال الوحدات":"30 days · unit occupancy"}</div>
    <p class="muted" style="margin:2px 0 14px;font-size:13px">${LANG==="ar"?"كل صف وحدة، كل عمود ليلة. المربعات الذهبية = ليالٍ خفّض محرّك التسعير سعرها (أفضل مرشّحي الفلاش).":"Each row a unit, each column a night. Gold cells = nights the pricing engine already softened (best flash candidates)."}</p>
    <div class="hm-scroll"><table class="hm"><thead><tr><th></th>${head}</tr></thead><tbody>${rows}</tbody></table></div>
    <div class="legend">
      <span><i class="sw" style="background:#3a4a35"></i>${tx("legend_book")}</span>
      <span><i class="sw" style="background:#332a1c"></i>${tx("legend_empty")}</span>
      <span><i class="sw" style="background:linear-gradient(150deg,var(--gold),var(--gold-deep))"></i>${tx("legend_soft")}</span>
      <span><i class="sw" style="background:#2a2620"></i>${tx("legend_block")}</span>
    </div></div>`;
}

/* ---------- List Health ---------- */
function bar(label,val,max,cls){
  const pct=max?Math.min(100,Math.round(val/max*100)):0;
  return `<div class="bar"><span class="dim">${label}</span><span class="track"><span class="fill ${cls||""}" style="width:${pct}%"></span></span><span class="n">${num(val)}</span></div>`;
}
function renderHealth(){
  const d=STATE.health;
  if(!d) return `<div class="card skel">${tx("loading")}</div>`;
  const h=d.health||{}; const total=h.total||0; const bt=h.by_tier||{};
  const tierMax=Math.max(1, bt.Turaif||0, bt.Gold||0, bt.Silver||0);
  return `<div class="card section"><div class="health">
    <div>
      <div class="h2">${tx("members")} · <span class="mono">${num(total)}</span></div>
      <div class="bars" style="margin-top:10px">
        ${bar("Turaif",bt.Turaif||0,tierMax,"")}
        ${bar("Gold",bt.Gold||0,tierMax,"")}
        ${bar("Silver",bt.Silver||0,tierMax,"")}
        ${bt.Quarantine?bar("Quarantine",bt.Quarantine,tierMax,"bad"):""}
      </div>
      <div class="h2" style="margin-top:18px">${LANG==="ar"?"الإتاحة":"Availability"}</div>
      <div class="bars" style="margin-top:10px">
        ${bar(tx("available"), Math.max(0,total-(h.opted_out||0)-(h.rested||0)-(h.upcoming||0)-(h.in_house||0)), total, "ok")}
        ${bar(tx("rested"), h.rested||0, total, "")}
        ${bar(tx("opted"), h.opted_out||0, total, "bad")}
        ${bar(tx("upcoming"), h.upcoming||0, total, "")}
      </div>
    </div>
    <div>
      <div class="statgrid">
        <div class="stat"><div class="v">${num(d.daily_cap)}</div><div class="k">${tx("cap")}</div></div>
        <div class="stat"><div class="v">${num(d.sent_today)}</div><div class="k">${tx("sent_today")}</div></div>
        <div class="stat"><div class="v">${num(d.remaining_today)}</div><div class="k">${tx("remain")}</div></div>
        <div class="stat"><div class="v">${num(h.in_house||0)}</div><div class="k">${tx("inhouse")}</div></div>
        <div class="stat"><div class="v">${num(h.opt_out_30d||0)}</div><div class="k">${tx("optrate")}</div></div>
        <div class="stat"><div class="v">${(d.adapter||"csv").toUpperCase()}</div><div class="k">${LANG==="ar"?"قناة التسليم":"Sender"}</div></div>
      </div>
      ${d.last_sync?`<div class="note">${LANG==="ar"?"آخر مزامنة حجوزات":"Last booking sync"}: ${(d.last_sync.at||"").replace("T"," ")} · ${LANG==="ar"?"تطابق بالجوال":"phone-matched"}: <b>${num(d.last_sync.matched_phone)}</b> · ${LANG==="ar"?"بدون جوال":"no phone"}: <b>${num(d.last_sync.no_phone)}</b></div>`:""}
      <div class="actions" style="margin-top:14px;align-items:center">
        <label class="btn gold sm" style="cursor:pointer">⬆ ${tx("import_members")}<input id="memFile" type="file" accept=".json,application/json" style="display:none"></label>
        <button class="btn ghost sm" id="seedBtn">↻ ${LANG==="ar"?"إعادة مزامنة الأعضاء":"Resync members"}</button>
        <span class="muted" style="font-size:12px">${(h.have_seed_file)?(LANG==="ar"?"✓ ملف الأعضاء محمَّل":"✓ member file loaded"):(LANG==="ar"?"لا يوجد ملف بعد — استورده مرة وحدة":"no file yet — import once")}</span>
      </div>
    </div>
  </div></div>`;
}

/* ---------- Campaigns ---------- */
function renderCampaigns(){
  const c=STATE.campaigns;
  if(!c) return `<div class="card skel">${tx("loading")}</div>`;
  const rows=c.map(x=>{
    const tiers=(x.tier_targets||[]).map(t=>`<span class="tier ${t}" style="padding:1px 7px">${t}</span>`).join(" ");
    return `<div class="crow"><span class="code">${x.code}</span><span class="nm">${x.name}</span>${tiers}
      <span class="muted" style="font-size:12px">${x.trigger_type}</span>
      <span class="pill ${x.active?"ok":"warn"}" style="font-size:11px">${x.active?(LANG==="ar"?"مفعّل":"on"):(LANG==="ar"?"موقوف":"off")}</span></div>`;
  }).join("");
  return `<div class="card section"><div class="h2">${LANG==="ar"?"كتالوج الحملات (٢٠)":"Campaign catalog (20)"}</div>
    <p class="muted" style="font-size:13px;margin:2px 0 14px">${LANG==="ar"?"المحرّك يختار حملة واحدة فقط لليوم حسب إشارات المخزون. النصوص العربية الحقيقية تُلصق لاحقاً.":"The engine picks ONE campaign per day from inventory signals. Real Arabic copy is pasted in later."}</p>
    <div class="clist">${rows}</div></div>`;
}

/* ---------- Settings ---------- */
const GROUP_LABELS={tiers:["الفئات","Tiers"],governor:["الحارس","Governor"],volume:["الحجم والإحماء","Volume & warm-up"],
  demand:["الطلب","Demand match"],signals:["الإشارات","Signals"],approval:["الاعتماد","Approval"]};
function renderSettings(){
  const s=STATE.settings;
  if(!s) return `<div class="card skel">${tx("loading")}</div>`;
  const order=["tiers","governor","volume","demand","signals","approval"];
  const groups=order.filter(g=>s[g]).map(g=>{
    const fields=s[g].map(f=>`<div class="field">
      <label>${LANG==="ar"?f.label_ar:f.label_en}</label>
      <input data-key="${f.key}" value="${f.value}" />
      <span class="hlp">${f.help||""}</span></div>`).join("");
    return `<div class="set-group"><h3>${GROUP_LABELS[g]?GROUP_LABELS[g][LANG==="ar"?0:1]:g}</h3><div class="set-grid">${fields}</div></div>`;
  }).join("");
  return `<div class="card section">${groups}
    <div class="actions"><button class="btn gold" id="saveSetBtn">${tx("save")}</button></div></div>`;
}

/* ---------- panel + wiring ---------- */
function renderPanel(){
  const p=document.getElementById("panel");
  if(TAB==="move") p.innerHTML=renderMove();
  else if(TAB==="heat") p.innerHTML=renderHeat();
  else if(TAB==="health") p.innerHTML=renderHealth();
  else if(TAB==="camp") p.innerHTML=renderCampaigns();
  else if(TAB==="set") p.innerHTML=renderSettings();
  wirePanel();
}
function wirePanel(){
  const ap=document.getElementById("approveBtn");
  if(ap) ap.onclick=async()=>{ if(!STATE.move) return;
    ap.disabled=true; ap.textContent="…";
    try{ const r=await post("/api/brain/approve",{rec_id:STATE.move.id});
      if(r.ok){ toast(tx("approved")); window.location="/api/brain/export/"+STATE.move.id+"?token="+encodeURIComponent(TOKEN); await loadMove(); }
      else { toast(r.error||"error"); ap.disabled=false; ap.textContent="✓ "+tx("approve"); }
    }catch(e){ ap.disabled=false; } };
  const rj=document.getElementById("rejectBtn");
  if(rj) rj.onclick=async()=>{ await post("/api/brain/reject",{rec_id:STATE.move.id}); toast("✕"); await loadMove(); };
  const rc=document.getElementById("recomputeBtn");
  if(rc) rc.onclick=async()=>{ rc.disabled=true; const r=await post("/api/brain/recompute",{}); STATE.move=r.move; renderKpis(); renderPanel(); toast("↻"); };
  const sd=document.getElementById("seedBtn");
  if(sd) sd.onclick=async()=>{ sd.disabled=true; sd.textContent="…"; await post("/api/brain/seed",{}); await loadHealth(); renderPanel(); toast("✓"); };
  const mf=document.getElementById("memFile");
  if(mf) mf.onchange=async(e)=>{ const f=e.target.files&&e.target.files[0]; if(!f) return; toast(tx("importing"));
    try{ const rows=JSON.parse(await f.text());
      const r=await post("/api/brain/seed-import", Array.isArray(rows)?{members:rows}:rows);
      if(r.ok){ toast((LANG==="ar"?"تم استيراد ":"Imported ")+num(r.total||0)); STATE.move=null; await loadHealth(); await loadMove(); renderPanel(); }
      else toast(r.error||"error");
    }catch(err){ toast(LANG==="ar"?"ملف غير صالح":"invalid file"); } };
  const sv=document.getElementById("saveSetBtn");
  if(sv) sv.onclick=async()=>{ const upd={}; document.querySelectorAll("#panel input[data-key]").forEach(i=>upd[i.getAttribute("data-key")]=i.value);
    const r=await post("/api/brain/settings",{settings:upd}); STATE.settings=r.settings; toast(tx("saved")); };
}

async function loadMove(){ try{ const r=await api("/api/brain/today"); STATE.move=r.move; }catch(e){} renderKpis(); if(TAB==="move")renderPanel(); }
async function loadHealth(){ try{ const r=await api("/api/brain/health"); STATE.health=r; }catch(e){} if(TAB==="health")renderPanel(); }
async function loadHeat(){ try{ const r=await api("/api/brain/heatmap?days=30"); STATE.heatmap=r.heatmap; }catch(e){} if(TAB==="heat")renderPanel(); }
async function loadCamp(){ try{ const r=await api("/api/brain/campaigns"); STATE.campaigns=r.campaigns; }catch(e){} if(TAB==="camp")renderPanel(); }
async function loadSet(){ try{ const r=await api("/api/brain/settings"); STATE.settings=r.settings; }catch(e){} if(TAB==="set")renderPanel(); }

async function loadAll(){
  await loadMove();
  loadHealth(); loadHeat(); loadCamp(); loadSet();
}

document.querySelectorAll("#langseg button").forEach(b=>b.onclick=()=>{ LANG=b.getAttribute("data-l"); localStorage.setItem("brain_lang",LANG); applyLang(); });
document.getElementById("refreshBtn").onclick=()=>{ STATE={move:null,health:null,heatmap:null,campaigns:null,settings:null}; renderPanel(); loadAll(); toast("↻"); };

applyLang();
loadAll();
</script>
</body>
</html>
